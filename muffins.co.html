<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muffins.co - Dessert & Cake Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 32px;
        }

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #FFD700;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            color: #fff;
            width: 250px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-pesan {
            background: #FF1493;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-pesan:hover {
            background: #FF69B4;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Section Title */
        .section-title {
            font-size: 32px;
            margin-bottom: 30px;
            color: #D2691E;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Menu Card */
        .menu-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(210, 105, 30, 0.3);
            border-color: #D2691E;
        }

        .menu-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: rgba(255, 255, 255, 0.3);
        }

        .menu-content {
            padding: 20px;
        }

        .menu-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #FFD700;
        }

        .menu-description {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .menu-price {
            font-size: 20px;
            font-weight: bold;
            color: #FF1493;
        }

        .btn-beli {
            background: linear-gradient(135deg, #D2691E 0%, #8B4513 100%);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-beli:hover {
            background: linear-gradient(135deg, #FF8C00 0%, #A0522D 100%);
        }

        /* Footer */
        footer {
            background: #0a0a0a;
            color: #888;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
            border-top: 1px solid #333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            header {
                padding: 15px 20px;
            }

            nav {
                gap: 15px;
            }

            .search-box {
                width: 100%;
                max-width: 150px;
            }
        }
    </style>
</head>
<body>

        // Fungsi untuk render menu
        function renderMenu(items) {
            const menuGrid = document.getElementById('menuGrid');
            menuGrid.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <div class="menu-image">${item.emoji}</div>
                    <div class="menu-content">
                        <div class="menu-name">${item.name}</div>
                        <div class="menu-description">${item.desc}</div>
                        <div class="menu-footer">
                            <div class="menu-price">Rp ${item.price.toLocaleString('id-ID')}</div>
                            <button class="btn-beli" onclick="addToCart('${item.name}', ${item.price})">Beli</button>
                        </div>
                    </div>
                `;
                menuGrid.appendChild(card);
            });
        }

        // Fungsi search
        document.getElementById('searchBox').addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = menuItems.filter(item =>
                item.name.toLowerCase().includes(searchTerm) ||
                item.desc.toLowerCase().includes(searchTerm)
            );
            renderMenu(filtered);
        });

        // Fungsi add to cart
        function addToCart(name, price) {
            alert(`✅ ${name}\nRp ${price.toLocaleString('id-ID')} ditambahkan ke keranjang!`);
        }

        // Render menu saat pertama kali load
        renderMenu(menuItems);
    </script>
</body>
</html>
